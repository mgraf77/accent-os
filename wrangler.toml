name = "accent-os"
main = "worker/anthropic-proxy.js"
compatibility_date = "2024-01-01"

# ── Secrets (values set via `wrangler secret put`, never stored here) ───────
# ANTHROPIC_API_KEY   — Anthropic API key for AI proxy
# BC_STORE_HASH       — BigCommerce store hash (e.g. store-xxxx)
# BC_ACCESS_TOKEN     — BigCommerce V2/V3 API access token
#
# Set with:
#   wrangler secret put ANTHROPIC_API_KEY
#   wrangler secret put BC_STORE_HASH
#   wrangler secret put BC_ACCESS_TOKEN
#
# Verify:
#   curl https://accentos-anthropic-proxy.mgraf77.workers.dev/
#   → {"version":"v4-bc-proxy","env_key_set":true,"bc_configured":true,...}
